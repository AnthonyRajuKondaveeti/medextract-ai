# ── Production Docker Compose Override (AWS) ───────────────────────────────────
# Usage on EC2:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --no-deps -d app
#
# This overrides the local docker-compose.yml for AWS production.
# The bundled Postgres (db) service is disabled — use AWS RDS instead.

services:
  app:
    image: 230511994508.dkr.ecr.ap-south-1.amazonaws.com/medextract-ai:latest
    # Clear all env_file entries from base, use only .env.prod
    env_file: 
      - .env.prod
    environment:
      ENV: production
      DATABASE_URL: "${DATABASE_URL}"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
