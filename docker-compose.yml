services:
  db:
    image: postgres:16-alpine
    container_name: medextract-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medextract
      POSTGRES_USER: med
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U med -d medextract" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medextract-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medextract-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    # env_file passes values to the container WITHOUT variable interpolation.
    # This is critical for ADMIN_PASSWORD_HASH — bcrypt hashes contain $ signs
    # that Docker Compose would otherwise treat as variable references.
    env_file:
      - .env
    environment:
      # Always point to the 'db' service inside Docker for local development.
      # On EC2, docker-compose.prod.yml overrides this with the RDS URL
      # via a shell-exported DATABASE_URL (see deployment guide Step 8).
      DATABASE_URL: postgresql://med:secret@db:5432/medextract
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
    networks:
      - medextract-network

volumes:
  postgres_data:
    driver: local

networks:
  medextract-network:
    driver: bridge
